<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
</head>
<body>
<h1>Digital Clock</h1>
<p id="digitalClock"></p>
<script>
setInterval(() => {
  const now = new Date();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const second = now.getSeconds();
  document.getElementById("digitalClock").innerHTML = `${hours}:${minutes}:${second}`

}, 1000);
</script>
</body>
</html>
